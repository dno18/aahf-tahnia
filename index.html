<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechZone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Cairo',sans-serif;background:#080c14;color:#f1f5f9;overflow-x:hidden}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#080c14}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.25);border-radius:3px}

/* ── NAV ── */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  height:64px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(8,12,20,0);
  transition:background .4s,backdrop-filter .4s,border-color .4s;
  border-bottom:1px solid transparent;
}
.nav.scrolled{
  background:rgba(8,12,20,.85);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border-bottom-color:rgba(255,255,255,.07);
}
.nav-inner{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;max-width:1300px;padding:0 2rem;
}
.logo{
  font-size:1.3rem;font-weight:900;letter-spacing:.02em;
  background:linear-gradient(120deg,#fff 20%,#67e8f9);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  cursor:pointer;
}
.nav-links{display:flex;gap:.2rem;list-style:none}
.nav-links button{
  background:none;border:none;
  color:rgba(255,255,255,.65);
  font-family:'Cairo',sans-serif;font-size:.9rem;font-weight:600;
  padding:.45rem 1rem;border-radius:8px;cursor:pointer;
  transition:color .2s,background .2s;
}
.nav-links button:hover,.nav-links button.active{
  color:#fff;background:rgba(255,255,255,.1);
}
/* hamburger hidden on desktop */
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:5px}
.hamburger span{width:22px;height:2px;background:#fff;border-radius:2px;transition:.3s}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}

/* mobile drawer */
.drawer{
  position:fixed;inset:0;z-index:999;pointer-events:none;
}
.drawer-bg{position:absolute;inset:0;background:rgba(0,0,0,.7);opacity:0;transition:.3s}
.drawer-panel{
  position:absolute;top:0;right:0;width:260px;height:100%;
  background:#0d1320;
  border-left:1px solid rgba(255,255,255,.07);
  transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
  padding-top:80px;padding-right:1.2rem;padding-left:1.2rem;
}
.drawer.open{pointer-events:all}
.drawer.open .drawer-bg{opacity:1}
.drawer.open .drawer-panel{transform:translateX(0)}
.drawer-panel button{
  display:block;width:100%;background:none;border:none;
  color:rgba(255,255,255,.8);font-family:'Cairo',sans-serif;font-size:1rem;font-weight:600;
  text-align:right;padding:.85rem .8rem;border-radius:8px;cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,.06);transition:.2s;
}
.drawer-panel button:hover{background:rgba(255,255,255,.08);color:#fff}

/* ── HERO ── */
.hero{position:relative;height:100vh;min-height:580px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.hero video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.3)}
.hero-grad{
  position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(8,12,20,.4) 0%,rgba(8,12,20,.15) 45%,rgba(8,12,20,.85) 100%);
}
.hero-content{position:relative;z-index:2;text-align:center;padding:2rem;max-width:680px}
.hero-tag{
  display:inline-block;
  border:1px solid rgba(103,232,249,.35);
  background:rgba(103,232,249,.08);
  color:#67e8f9;border-radius:50px;
  font-size:.78rem;font-weight:700;letter-spacing:.08em;
  padding:.3rem 1rem;margin-bottom:1.6rem;
}
.hero h1{
  font-size:clamp(2.4rem,6vw,4.8rem);font-weight:900;line-height:1.15;
  color:#fff;margin-bottom:1rem;
  text-shadow:0 2px 40px rgba(0,0,0,.5);
}
.hero h1 span{
  background:linear-gradient(120deg,#67e8f9,#818cf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero p{color:rgba(255,255,255,.6);font-size:1rem;margin-bottom:2.5rem;line-height:1.7}
.hero-btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.btn-main{
  background:#fff;color:#0a0f1a;
  border:none;padding:.8rem 2rem;border-radius:50px;
  font-family:'Cairo',sans-serif;font-size:.95rem;font-weight:800;
  cursor:pointer;transition:.3s;
}
.btn-main:hover{background:#e0f2fe;transform:translateY(-2px)}
.btn-ghost{
  background:rgba(255,255,255,.08);color:#fff;
  border:1px solid rgba(255,255,255,.2);padding:.8rem 2rem;border-radius:50px;
  font-family:'Cairo',sans-serif;font-size:.95rem;font-weight:700;
  cursor:pointer;backdrop-filter:blur(8px);transition:.3s;
}
.btn-ghost:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.4)}

/* ── SECTIONS ── */
section{display:none;min-height:calc(100vh - 64px);padding:5rem 2rem 4rem}
section.active{display:block}
#home.active{padding:0}

.wrap{max-width:1300px;margin:0 auto}
.sec-head{text-align:center;margin-bottom:3rem}
.sec-label{font-size:.75rem;font-weight:700;color:#67e8f9;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.5rem}
.sec-title{font-size:clamp(1.6rem,3.5vw,2.4rem);font-weight:900;color:#fff}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);background:#0d1320;border-top:1px solid rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.06)}
.stat{padding:1.4rem 1rem;text-align:center;border-left:1px solid rgba(255,255,255,.06)}
.stat:last-child{border-left:none}
.stat-n{font-size:1.6rem;font-weight:900;background:linear-gradient(120deg,#67e8f9,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-l{font-size:.75rem;color:rgba(255,255,255,.4);margin-top:.2rem}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1.4rem}

/* ── CARD ── */
.card{
  background:#111827;border-radius:14px;
  border:1px solid rgba(255,255,255,.07);
  overflow:hidden;cursor:pointer;
  transition:transform .3s,border-color .3s,box-shadow .3s;
}
.card:hover{transform:translateY(-5px);border-color:rgba(103,232,249,.3);box-shadow:0 16px 40px rgba(0,0,0,.5)}
.card-img{height:190px;overflow:hidden;background:#141e30;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.card:hover .card-img img{transform:scale(1.07)}
.card-tag{
  position:absolute;top:.6rem;right:.6rem;
  background:rgba(103,232,249,.15);border:1px solid rgba(103,232,249,.3);
  color:#67e8f9;font-size:.65rem;font-weight:700;letter-spacing:.06em;
  padding:.2rem .6rem;border-radius:50px;
}
.card-body{padding:.9rem 1rem 1.1rem}
.card-name{font-size:.9rem;font-weight:700;color:#f1f5f9;margin-bottom:.25rem;line-height:1.4}
.card-sub{font-size:.72rem;color:rgba(255,255,255,.35);margin-bottom:.6rem;line-height:1.5}
.card-price{font-size:1.05rem;font-weight:900;color:#67e8f9}
.card-old{font-size:.78rem;color:rgba(255,255,255,.3);text-decoration:line-through;margin-right:.4rem}

/* ── HOME INNER ── */
.home-products{padding:3rem 2rem 4rem}

/* ── SLIDER ── */
.slider-wrap{overflow:hidden}
.slider-track{display:flex;gap:1.1rem;transition:transform .55s cubic-bezier(.4,0,.2,1)}
.s-card{
  flex-shrink:0;width:190px;
  background:#111827;border-radius:12px;
  border:1px solid rgba(255,255,255,.07);
  overflow:hidden;cursor:pointer;transition:.25s;
}
.s-card:hover{border-color:rgba(103,232,249,.3);transform:scale(1.03)}
.s-card img{width:100%;height:130px;object-fit:cover}
.s-card-info{padding:.6rem .75rem}
.s-card-info h5{font-size:.8rem;font-weight:700;color:#f1f5f9;margin-bottom:.2rem}
.s-card-info p{font-size:.75rem;font-weight:900;color:#67e8f9}
.dots{display:flex;gap:.45rem;justify-content:center;margin-top:1rem}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.15);cursor:pointer;transition:.2s}
.dot.active{background:#67e8f9;width:22px;border-radius:4px}

/* ── DETAILS ── */
.det-wrap{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start;padding:5rem 2rem 4rem;max-width:1300px;margin:0 auto}
.det-img{border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,.07);background:#141e30;aspect-ratio:1}
.det-img img{width:100%;height:100%;object-fit:cover}
.det-cat{font-size:.75rem;font-weight:700;color:#67e8f9;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.6rem}
.det-name{font-size:1.8rem;font-weight:900;color:#fff;margin-bottom:.5rem}
.det-price{font-size:2.1rem;font-weight:900;color:#fbbf24;margin:1rem 0}
.det-price small{font-size:.9rem;font-weight:500;color:rgba(255,255,255,.4)}
.det-desc{
  color:rgba(255,255,255,.6);line-height:1.8;font-size:.9rem;
  padding:1rem;border-radius:8px;
  background:rgba(255,255,255,.03);
  border-right:3px solid rgba(103,232,249,.5);
  margin-bottom:1.5rem;
}
.specs{display:grid;gap:.5rem;margin-bottom:2rem}
.spec{display:flex;align-items:center;gap:.6rem;font-size:.85rem;color:rgba(255,255,255,.6)}
.spec::before{content:'✓';width:18px;height:18px;border-radius:50%;background:rgba(103,232,249,.1);border:1px solid rgba(103,232,249,.3);color:#67e8f9;font-size:.65rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.det-btns{display:flex;gap:1rem;flex-wrap:wrap}
.btn-cart{
  flex:1;background:linear-gradient(135deg,#fbbf24,#f97316);color:#000;
  border:none;padding:1rem 1.5rem;border-radius:50px;
  font-family:'Cairo',sans-serif;font-size:.95rem;font-weight:800;
  cursor:pointer;transition:.3s;
}
.btn-cart:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(251,191,36,.35)}
.btn-back{
  background:rgba(255,255,255,.07);color:#fff;
  border:1px solid rgba(255,255,255,.12);padding:1rem 1.5rem;border-radius:50px;
  font-family:'Cairo',sans-serif;font-size:.95rem;font-weight:600;
  cursor:pointer;transition:.3s;
}
.btn-back:hover{background:rgba(255,255,255,.13)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);
  background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;
  padding:.75rem 1.8rem;border-radius:50px;font-weight:700;font-size:.85rem;
  z-index:9999;box-shadow:0 8px 30px rgba(14,165,233,.3);
  transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .nav-links{display:none}
  .hamburger{display:flex}
  .stats{grid-template-columns:repeat(2,1fr)}
  .stat:nth-child(2){border-left:none}
  .det-wrap{grid-template-columns:1fr}
}
@media(max-width:550px){
  .grid{grid-template-columns:repeat(2,1fr);gap:.8rem}
  .card-img{height:150px}
  .hero h1{font-size:2rem}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav" id="nav">
  <div class="nav-inner">
    <div class="logo" onclick="go('home')">TechZone</div>
    <ul class="nav-links" id="deskLinks">
      <li><button onclick="go('home')" id="nb-home" class="active">الرئيسية</button></li>
      <li><button onclick="go('products')" id="nb-products">المنتجات</button></li>
      <li><button onclick="go('offers')" id="nb-offers">العروض</button></li>
      <li><button onclick="alert('قريباً')">تسجيل الدخول</button></li>
    </ul>
    <div class="hamburger" id="ham" onclick="toggleDrawer()"><span></span><span></span><span></span></div>
  </div>
</nav>

<!-- MOBILE DRAWER -->
<div class="drawer" id="drawer">
  <div class="drawer-bg" onclick="toggleDrawer()"></div>
  <div class="drawer-panel">
    <button onclick="go('home');toggleDrawer()">الرئيسية</button>
    <button onclick="go('products');toggleDrawer()">المنتجات</button>
    <button onclick="go('offers');toggleDrawer()">العروض</button>
    <button onclick="alert('قريباً')">تسجيل الدخول</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ══ HOME ══ -->
<section id="home" class="active">

  <!-- HERO -->
  <div class="hero">
    <video id="heroVid" autoplay muted loop playsinline></video>
    <div class="hero-grad"></div>
    <div class="hero-content">
      <h1>أجهزة ذكية<br><span>بأسعار استثنائية</span></h1>
      <p>أفضل المنتجات التقنية — ضمان شامل وشحن سريع لجميع مناطق المملكة</p>
      <div class="hero-btns">
        <button class="btn-main" onclick="go('products')">تسوق الآن</button>
        <button class="btn-ghost" onclick="go('offers')">عروض اليوم</button>
      </div>
    </div>
  </div>

 

  <!-- SLIDER -->
  <div class="home-products">
    <div class="wrap">
      <div class="sec-head" style="text-align:right;margin-bottom:1.4rem">
        <div class="sec-label">الأكثر مبيعاً</div>
        <div class="sec-title">منتجات مميزة</div>
      </div>
      <div class="slider-wrap"><div class="slider-track" id="slTrk"></div></div>
      <div class="dots" id="slDots"></div>

      <!-- HOME GRID -->
      <div class="sec-head" style="margin-top:3rem;margin-bottom:1.6rem">
        <div class="sec-label">اكتشف</div>
        <div class="sec-title">أحدث الإضافات</div>
      </div>
      <div class="grid" id="homeGrid"></div>
    </div>
  </div>
</section>

<!-- ══ PRODUCTS ══ -->
<section id="products">
  <div class="wrap">
    <div class="sec-head"><div class="sec-label">المتجر</div><div class="sec-title">جميع المنتجات</div></div>
    <div class="grid" id="proGrid"></div>
  </div>
</section>

<!-- ══ OFFERS ══ -->
<section id="offers">
  <div class="wrap">
    <div class="sec-head"><div class="sec-label">خصومات حصرية</div><div class="sec-title">العروض الرائعة</div></div>
    <div class="grid" id="offGrid"></div>
  </div>
</section>

<!-- ══ DETAILS ══ -->
<section id="details"></section>

<script>
const P=[
  {name:"ايفون 17 برو ماكس",img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR0ia63c3Qhl5-fvAtDQtwmcLw90Lan3AwlAg&s",price:4699,desc:"معالج A19 - شاشة 6.9 إنش - بطارية فائقة - كاميرا 8K",cat:"هاتف"},

  {name:"هواوي ميت 60",img:"https://nakheeltawa.iq/wp-content/uploads/2024/12/sellpoint-2.jpg",price:2999,desc:"شاشة AMOLED 120Hz - كاميرا Leica - بطارية 5000mAh",cat:"هاتف"},

  {name:"AirPods Pro 3",img:"https://i.gadgets360cdn.com/large/airpods_pro_2nd_generation_1702969555707.jpg",price:999,desc:"صوت مكاني - ضد الماء - إلغاء ضوضاء",cat:"سماعات"},
  {name:"Keyboard RGB",img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSSgRCeD4oLV9wDEU12tHsjP_3_QaA-BEJmcA&s",price:199,desc:"مفاتيح ميكانيكية - إضاءة RGB قابلة للتخصيص",cat:"ملحقات"},
  {name:"Gaming Mouse",img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTYn6KXBYNZ1h1_OXWlIIMAmY50QczPlfLFdQ&s",price:79,desc:"25600 DPI - 11 زر قابل للبرمجة",cat:"ملحقات"},
  {name:"RTX 4090",img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR3DaKtRlnMnWWEg3OAQ7KhphcO6k-vld1JiQ&s",price:6999,desc:"24GB GDDR6X - أقوى كرت شاشة",cat:"قطع"},
  {name:"AMD Ryzen 9",img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRxwyn70zV8-zZs-2RcgUU2urjDSE98t3sewQ&s",price:1899,desc:"16 نواة 32 خيط - مثالي للألعاب",cat:"قطع"},

  {name:"Nintendo Switch 2",img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRDECtfGTcPuZXQsKuSKbBjNHqKCbV_b_WRyg&s",price:1299,desc:"عائلي ومتعدد الأنماط - ألعاب بلا حدود",cat:"ألعاب"},
  {name:"Smart Watch 9",img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQOcTvjlvVVlGk2lD-Fv3bkFGdOwxveFu811A&s",price:299,desc:"مراقبة صحية شاملة - GPS - بطارية 18 يوم",cat:"ساعة"},
  {name:"SSD 2TB NVMe",img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRxwyn70zV8-zZs-2RcgUU2urjDSE98t3sewQ&s",price:699,desc:"7000MB/s - PCIe Gen4 - ضمان 5 سنوات",cat:"تخزين"},
  {name:"RAM 32GB DDR5",img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRxwyn70zV8-zZs-2RcgUU2urjDSE98t3sewQ&s",price:399,desc:"DDR5 6400MHz - مثالي للألعاب",cat:"قطع"},
  {name:"Drone 4K Pro",img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQpgbXUmQzyb0hrN47KS0HbN749PX-eQRcwiw&s",price:1499,desc:"4K 60fps - جيروسكوب - 35 دقيقة طيران",cat:"درون"},
  {name:"Gaming Monitor 27",img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTpfPI9eIqNzWRExhYY1J3D16vZndoaGt4GiQ&s",price:999,desc:"144Hz - 1ms - HDR400 - IPS",cat:"شاشة"},
  {name:"Canon EOS R6",img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQI8ll2CoAT8PMvzzShUYbhkD0jRkwLNKSKYA&s",price:3199,desc:"20MP - 4K RAW - استقرار بصري 8 محاور",cat:"كاميرا"}
];

/* nav scroll */
const nav=document.getElementById('nav');
window.addEventListener('scroll',()=>nav.classList.toggle('scrolled',scrollY>30),{passive:true});

/* navigate */
function go(p){
  document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
  document.getElementById(p).classList.add('active');
  document.querySelectorAll('#deskLinks button').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nb-'+p);if(nb)nb.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

/* drawer */
function toggleDrawer(){
  document.getElementById('drawer').classList.toggle('open');
  document.getElementById('ham').classList.toggle('open');
}

/* card html */
function card(p,i,disc=0){
  const op=disc?`<span class="card-old">${(p.price*(1+disc/100)).toFixed(0)} ر.س</span>`:'';
  return`<div class="card" onclick="det(${i})">
    <div class="card-img"><img src="${p.img}" alt="${p.name}" loading="lazy"><div class="card-tag">${p.cat}</div></div>
    <div class="card-body">
      <div class="card-name">${p.name}</div>
      <div class="card-sub">${p.desc}</div>
      <div class="card-price">${op}${p.price.toLocaleString()} <small style="font-size:.72rem;font-weight:500;color:rgba(255,255,255,.35)">ر.س</small></div>
    </div>
  </div>`;
}

/* render */
document.getElementById('proGrid').innerHTML=P.map((p,i)=>card(p,i)).join('');
document.getElementById('offGrid').innerHTML=[0,3,6,10,12,17].map(i=>card(P[i],i,15)).join('');
document.getElementById('homeGrid').innerHTML=P.slice(10).map((p,i)=>card(p,i+10)).join('');

/* slider */
let slCur=0;const VIS=5;
const trk=document.getElementById('slTrk');
const dts=document.getElementById('slDots');
trk.innerHTML=P.map((p,i)=>`<div class="s-card" onclick="det(${i})"><img src="${p.img}" loading="lazy"><div class="s-card-info"><h5>${p.name}</h5><p>${p.price.toLocaleString()} ر.س</p></div></div>`).join('');
const pages=Math.ceil(P.length/VIS);
dts.innerHTML=Array.from({length:pages},(_,i)=>`<div class="dot${i===0?' active':''}" onclick="slGo(${i})"></div>`).join('');
function slGo(pg){slCur=pg;const w=202;trk.style.transform=`translateX(${pg*VIS*w}px)`;dts.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===pg))}
setInterval(()=>slGo((slCur+1)%pages),3200);

/* details */
function det(i){
  const p=P[i];
  go('details');
  document.getElementById('details').innerHTML=`<div class="det-wrap">
    <div class="det-img"><img src="${p.img}" alt="${p.name}"></div>
    <div>
      <div class="det-cat">${p.cat}</div>
      <div class="det-name">${p.name}</div>
      <div class="det-price">${p.price.toLocaleString()} <small>ر.س</small></div>
      <div class="det-desc">${p.desc}</div>
      <div class="specs">${p.desc.split(' - ').map(s=>`<div class="spec">${s}</div>`).join('')}</div>
      <div class="det-btns">
        <button class="btn-cart" onclick="toast('${p.name}')">أضف للسلة</button>
        <button class="btn-back" onclick="go('products')">رجوع</button>
      </div>
    </div>
  </div>`;
}

/* toast */
function toast(n){
  const t=document.getElementById('toast');
  t.textContent=`تمت إضافة "${n}" للسلة`;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}
</script>
