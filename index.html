<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى أغلى دانا</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@400;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Tajawal', sans-serif;
            background-color: #0b0b0b;
            color: white;
            overflow: hidden;
        }

        /* صفحة تسجيل الدخول */
        #login-page {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(45deg, #0b0b0b, #1a0a1a);
        }

        .login-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 20, 147, 0.3);
            text-align: center;
        }

        input {
            padding: 15px;
            width: 200px;
            border-radius: 50px;
            border: 1px solid #ff1493;
            background: transparent;
            color: white;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(255, 20, 147, 0.2);
        }

        button {
            padding: 12px 40px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(90deg, #ff1493, #ff85a2);
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.4s;
        }

        button:hover { transform: scale(1.05); box-shadow: 0 0 20px #ff1493; }

        /* صفحة المحتوى */
        #content-page {
            display: none;
            height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fffafa; /* خلفية ناعمة مائلة للوردي الفاتح جداً */
            color: #333;
            position: relative;
        }

        /* حاوية القلب المكون من كلمات */
        #word-heart-container {
            position: relative;
            width: 500px;
            height: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        .heart-word {
            position: absolute;
            color: #ff1493;
            font-size: 14px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .main-message {
            text-align: center;
            z-index: 100;
            background: rgba(255, 255, 255, 0.8);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h1 { font-family: 'Amiri', serif; color: #d0006f; font-size: 2.8rem; margin: 0; }
        p.sub-text { font-size: 1.3rem; color: #555; line-height: 1.6; }

        .floating-rose {
            position: absolute;
            font-size: 25px;
            pointer-events: none;
            animation: floatRoses 6s linear infinite;
            opacity: 0.6;
        }

        @keyframes floatRoses {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }

        .bottom-tag {
            position: absolute;
            bottom: 20px;
            font-size: 0.9rem;
            color: #ff85a2;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-box">
            <h2 style="color: #ff85a2;">بانتظارك دنو..</h2>
            <input type="text" id="username" placeholder="اكتبي اسم الدلع.." autocomplete="off">
            <br>
            <button onclick="revealLove()">دخول لقلبي</button>
        </div>
    </div>

    <div id="content-page">
        <div id="word-heart-container">
            <!-- سيتم إنشاء الكلمات هنا بواسطة JS -->
            <div class="main-message">
                <h1>يا ضي عيني يا دانا</h1>
                <p class="sub-text">
                    آسف على كل لحظة ضيق تسببت فيها..<br>
                    أنتِ الرضا، وأنتِ الهدية، وأنتِ أجمل دانا بالكون.
                </p>
                <div style="font-size: 2rem; color: #ff1493; margin-top: 10px;">🌹🤍</div>
            </div>
        </div>
        <div class="bottom-tag">أحبكِ دائماً وأبداً</div>
    </div>

    <script>
        function revealLove() {
            const user = document.getElementById('username').value.toLowerCase();
            if (user === 'dno' || user === 'دنو') {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('content-page').style.display = 'flex';
                generateWordHeart();
                startRoses();
            } else {
                alert('الرمز خاص بـ دنو فقط ❤️');
            }
        }

        // دالة لرسم قلب مكون من كلمات "دنو أحبك"
        function generateWordHeart() {
            const container = document.getElementById('word-heart-container');
            const totalWords = 80; // عدد الكلمات
            const phrase = "دنو أحبك";
            
            for (let i = 0; i < totalWords; i++) {
                const word = document.createElement('div');
                word.innerText = phrase;
                word.className = 'heart-word';
                
                // معادلة رسم القلب الرياضية
                const t = (i / totalWords) * 2 * Math.PI;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                
                // تكبير الحجم وتوسيط المكان
                const posX = 250 + x * 15;
                const posY = 200 + y * 15;
                
                word.style.left = posX + 'px';
                word.style.top = posY + 'px';
                
                container.appendChild(word);
                
                // ظهور الكلمات تدريجياً وبترتيب جميل
                setTimeout(() => {
                    word.style.opacity = '0.8';
                }, i * 40);
            }
        }

        // تساقط ورود بدلاً من القلوب التقليدية
        function startRoses() {
            const roses = ['🌸', '🌹', '🌷', '✨'];
            setInterval(() => {
                const rose = document.createElement('div');
                rose.className = 'floating-rose';
                rose.innerText = roses[Math.floor(Math.random() * roses.length)];
                rose.style.left = Math.random() * 100 + 'vw';
                rose.style.fontSize = (Math.random() * 20 + 20) + 'px';
                rose.style.animationDuration = (Math.random() * 4 + 4) + 's';
                document.getElementById('content-page').appendChild(rose);
                
                setTimeout(() => rose.remove(), 6000);
            }, 400);
        }
    </script>
</body>
</html>
