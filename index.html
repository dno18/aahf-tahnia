<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إلى دانا</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;600&display=swap');

        :root {
            --bg-color: #fffafb;
            --accent-color: #ff4d6d;
            --soft-pink: #ffccd5;
            --text-dark: #4a131e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Noto Kufi Arabic', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            overflow: hidden;
        }

        /* خلفية فنية متحركة */
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(at 0% 0%, #ffedf0 0, transparent 50%),
                radial-gradient(at 100% 0%, #ffe3e8 0, transparent 50%),
                radial-gradient(at 100% 100%, #fff0f3 0, transparent 50%),
                radial-gradient(at 0% 100%, #ffebef 0, transparent 50%);
            z-index: -1;
        }

        /* صفحة الدخول */
        #login-page {
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; height: 100%; padding: 20px;
            transition: all 0.6s ease;
        }

        .login-card {
            width: 100%; max-width: 350px; text-align: center;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            padding: 40px 30px; border-radius: 30px;
            box-shadow: 0 10px 40px rgba(255, 77, 109, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .input-field {
            width: 100%; padding: 16px; border-radius: 15px;
            border: 1.5px solid var(--soft-pink);
            background: white; margin: 20px 0; outline: none;
            text-align: center; font-size: 1rem; color: var(--text-dark);
            transition: 0.3s;
        }

        .input-field:focus { border-color: var(--accent-color); }

        .submit-btn {
            width: 100%; padding: 16px; border-radius: 15px; border: none;
            background: var(--accent-color); color: white;
            font-weight: 600; font-size: 1rem; cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
        }

        /* صفحة المحتوى */
        #content-page {
            display: none; height: 100%; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }

        #heart-container {
            position: relative; width: 320px; height: 320px;
            display: flex; justify-content: center; align-items: center;
        }

        .heart-word {
            position: absolute; color: var(--accent-color);
            font-size: 12px; font-weight: 600; opacity: 0;
            white-space: nowrap; transition: 0.5s ease;
        }

        .message-area {
            position: absolute; width: 180px; z-index: 10;
        }

        .message-area h1 { 
            font-size: 1.8rem; margin: 0; color: var(--accent-color); 
        }

        .message-area p { 
            font-size: 0.95rem; line-height: 1.6; margin-top: 10px;
        }

        /* بتلات الورد المتساقطة */
        .flower {
            position: absolute; pointer-events: none;
            animation: fall linear forwards; opacity: 0.6;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }

        @media (max-width: 480px) {
            #heart-container { transform: scale(0.9); }
            .message-area h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="mesh-bg"></div>

    <div id="login-page">
        <div class="login-card">
            <h2 style="margin: 0; font-weight: 300;">أهلاً بجميلة القلب</h2>
            <p style="font-size: 0.9rem; opacity: 0.7; margin-top: 10px;">اكتبي "دنو" للبداية</p>
            <input type="text" id="pass" class="input-field" placeholder="اسم الدلع.." autocomplete="off">
            <button class="submit-btn" onclick="openHeart()">دخول</button>
        </div>
    </div>

    <div id="content-page">
        <div id="heart-container">
            <div class="message-area">
                <h1>دانا..</h1>
                <p>يا ضي عيني، زعلك غيمة وابتسامتك هي الحياة. أحبك دائمًا.</p>
                <span style="font-size: 1.5rem;">🌸</span>
            </div>
        </div>
    </div>

    <script>
        function openHeart() {
            const val = document.getElementById('pass').value.trim().toLowerCase();
            if (val === 'دنو' || val === 'dno') {
                document.getElementById('login-page').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-page').style.display = 'none';
                    document.getElementById('content-page').style.display = 'flex';
                    buildHeart();
                    spawnFlowers();
                }, 600);
            } else {
                alert('الرمز لـ دنو فقط ❤️');
            }
        }

        function buildHeart() {
            const container = document.getElementById('heart-container');
            const total = 60;
            const text = "دنو أحبك";
            
            for (let i = 0; i < total; i++) {
                const span = document.createElement('span');
                span.className = 'heart-word';
                span.innerText = text;
                
                const angle = (i / total) * 2 * Math.PI;
                // معادلة القلب مضبوطة للجوال
                const x = 16 * Math.pow(Math.sin(angle), 3);
                const y = -(13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle));
                
                span.style.left = `calc(50% + ${x * 9}px)`;
                span.style.top = `calc(50% + ${y * 9}px)`;
                
                container.appendChild(span);
                
                setTimeout(() => {
                    span.style.opacity = '0.8';
                }, i * 30);
            }
        }

        function spawnFlowers() {
            const icons = ['🌸', '✨', '🌷'];
            setInterval(() => {
                const f = document.createElement('div');
                f.className = 'flower';
                f.innerText = icons[Math.floor(Math.random() * icons.length)];
                f.style.left = Math.random() * 100 + 'vw';
                f.style.top = '-20px';
                f.style.fontSize = (Math.random() * 15 + 15) + 'px';
                f.style.animationDuration = (Math.random() * 3 + 4) + 's';
                document.body.appendChild(f);
                setTimeout(() => f.remove(), 5000);
            }, 500);
        }
    </script>
</body>
</html>
