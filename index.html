<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إلى أميرتي دانا</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Tajawal', sans-serif;
            background-color: #0b0b0b;
            color: white;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* صفحة تسجيل الدخول */
        #login-page {
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; transition: 0.8s ease-out;
            padding: 20px;
        }

        .login-box {
            background: #1a1a1a;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.2);
            text-align: center;
            border: 1px solid #ff1493;
            width: 100%;
            max-width: 350px;
        }

        input {
            padding: 15px; width: 100%;
            border-radius: 25px; border: 2px solid #ff1493;
            background: transparent; color: white;
            text-align: center; font-size: 1.1rem;
            outline: none; margin-bottom: 20px;
        }

        button {
            padding: 12px 40px; border-radius: 25px; border: none;
            background: #ff1493; color: white;
            cursor: pointer; font-weight: bold; transition: 0.3s;
        }

        button:hover { transform: scale(1.05); box-shadow: 0 0 15px #ff1493; }

        /* صفحة المحتوى */
        #content-page {
            display: none; height: 100vh;
            flex-direction: column; align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #2d0a1a 0%, #0b0b0b 100%);
            position: relative; padding: 20px;
        }

        #heart-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .heart-word {
            position: absolute; color: #ff1493;
            font-size: 10px; font-weight: bold;
            opacity: 0; white-space: nowrap;
            transition: opacity 0.5s ease;
        }

        .gift-container {
            text-align: center; z-index: 10;
            position: absolute; width: 220px;
        }

        h1 { color: #ff1493; font-size: 2rem; margin: 10px 0; }
        .nickname { font-size: 1.1rem; color: #ff85a2; margin-bottom: 10px; }
        
        .message-text {
            font-size: 0.95rem; line-height: 1.6;
            color: #eee; margin: 0;
        }

        /* تساقط قلوب خفيف */
        .floating-heart {
            position: absolute; color: rgba(255, 20, 147, 0.4);
            pointer-events: none; animation: move linear forwards;
        }

        @keyframes move {
            to { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-box">
            <h2 style="margin-bottom: 20px;">دخول النظام الخاص</h2>
            <p style="font-size: 0.9rem; color: #888; margin-bottom: 20px;">أدخلي رمز الدخول لفتح الهدية</p>
            <input type="text" id="username" placeholder="اكتبي 'دنو' هنا.." autocomplete="off">
            <button onclick="checkLogin()">فتح</button>
        </div>
    </div>

    <div id="content-page">
        <div id="heart-container">
            <!-- الكلمات ستظهر هنا لتشكل القلب -->
            <div class="gift-container">
                <div style="font-size: 2.5rem;">💝</div>
                <h1>يا دانا</h1>
                <p class="nickname">يا أغلى "دنو" بالكون</p>
                <p class="message-text">آسف إذا زعلتك يا ضي عيني، زعلك غيمة وابتسامتك هي الحياة اللي تخليني أستمر.</p>
                <div style="margin-top: 15px; color: #ff1493; font-size: 1.2rem;">🌹🤍</div>
            </div>
        </div>
    </div>

    <script>
        function checkLogin() {
            const user = document.getElementById('username').value.trim().toLowerCase();
            if (user === 'dno' || user === 'دنو') {
                document.getElementById('login-page').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-page').style.display = 'none';
                    document.getElementById('content-page').style.display = 'flex';
                    createWordHeart();
                    startFloatingHearts();
                }, 600);
            } else {
                alert('الرمز لـ دنو فقط ❤️');
            }
        }

        function createWordHeart() {
            const container = document.getElementById('heart-container');
            const total = 60;
            const text = "دنو أحبك";
            
            for (let i = 0; i < total; i++) {
                const span = document.createElement('span');
                span.className = 'heart-word';
                span.innerText = text;
                
                const angle = (i / total) * 2 * Math.PI;
                // معادلة القلب
                const x = 16 * Math.pow(Math.sin(angle), 3);
                const y = -(13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle));
                
                // تحديد المواقع لتناسب الجوال (scale 8)
                span.style.left = `calc(50% + ${x * 8}px)`;
                span.style.top = `calc(50% + ${y * 8}px)`;
                
                container.appendChild(span);
                
                setTimeout(() => {
                    span.style.opacity = '0.8';
                }, i * 40);
            }
        }

        function startFloatingHearts() {
            setInterval(() => {
                const h = document.createElement('div');
                h.className = 'floating-heart';
                h.innerHTML = '❤️';
                h.style.left = Math.random() * 100 + 'vw';
                h.style.top = '100vh';
                h.style.fontSize = (Math.random() * 10 + 10) + 'px';
                h.style.animationDuration = (Math.random() * 3 + 4) + 's';
                document.body.appendChild(h);
                setTimeout(() => h.remove(), 5000);
            }, 600);
        }
    </script>
</body>
</html>
